# Railway production deployment.
# Uses the same Dockerfile as local Docker so behavior is byte-identical.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Default to the prod runner stage; override with $RAILWAY_DOCKERFILE_TARGET
# if a one-off deploy needs `dev` or `builder`.
startCommand = "node server.js"
healthcheckPath = "/api/health"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[[deploy.environmentVariables]]
name = "NODE_ENV"
value = "production"

[[deploy.environmentVariables]]
name = "NEXT_TELEMETRY_DISABLED"
value = "1"
